<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crisp — сокращатель ссылок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 13C10.4295 13.5741 10.9774 14.0491 11.6066 14.3929C12.2357 14.7367 12.9315 14.9411 13.6467 14.9923C14.3618 15.0435 15.0796 14.9403 15.7513 14.6897C16.4231 14.4392 17.0331 14.047 17.54 13.54L20.54 10.54C21.4508 9.59695 21.9548 8.33394 21.9434 7.02296C21.932 5.71198 21.4061 4.45791 20.4791 3.53087C19.5521 2.60383 18.298 2.07799 16.987 2.0666C15.676 2.0552 14.413 2.55918 13.47 3.46997L11.75 5.17997" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 11C13.5705 10.4259 13.0226 9.95089 12.3934 9.60707C11.7643 9.26325 11.0685 9.05887 10.3533 9.00768C9.63819 8.95648 8.92036 9.05973 8.24865 9.31026C7.57694 9.56079 6.96693 9.95296 6.46 10.46L3.46 13.46C2.54921 14.403 2.04523 15.666 2.05662 16.977C2.06802 18.288 2.59386 19.5421 3.5209 20.4691C4.44794 21.3962 5.70201 21.922 7.01299 21.9334C8.32397 21.9448 9.58698 21.4408 10.53 20.53L12.24 18.82" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">crisp</span>
            </div>
            <p class="tagline">чистое сокращение ссылок</p>
        </header>

        <div class="card">
            <div class="input-section">
                <div class="url-input-wrapper">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                    </svg>
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="Вставьте длинную ссылку здесь..." 
                        autocomplete="off"
                    >
                </div>
                
                <button id="shortenBtn" class="btn-primary">
                    <span>✨</span>
                    <span>Сократить</span>
                </button>
            </div>

            <div id="resultArea" class="result-area" style="display: none;">
                <div class="result-card">
                    <div class="result-header">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                            <polyline points="15 3 21 3 21 9" />
                            <line x1="10" y1="14" x2="21" y2="3" />
                        </svg>
                        <span>Ваша короткая ссылка готова</span>
                    </div>
                    <div class="short-link-container">
                        <div class="short-link" id="shortUrlDisplay"></div>
                        <button id="copyBtn" class="btn-copy">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            <span>Копировать</span>
                        </button>
                    </div>
                    <div id="statsPreview" class="stats-preview"></div>
                </div>
            </div>

            <div id="errorArea" class="error-area" style="display: none;">
                <div class="error-card">
                    <span>⚠️</span>
                    <span id="errorMessage"></span>
                </div>
            </div>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h3>Мгновенно</h3>
                <p>Сокращение за миллисекунды</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <h3>Статистика</h3>
                <p>Отслеживайте переходы</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <h3>Надёжно</h3>
                <p>Ваши ссылки в безопасности</p>
            </div>
        </div>

        <div id="statsSection" class="stats-section" style="display: none;">
            <div class="stats-header">
                <h2>Последние ссылки</h2>
                <button id="refreshStatsBtn" class="btn-icon">🔄</button>
            </div>
            <div id="statsList" class="stats-list"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
